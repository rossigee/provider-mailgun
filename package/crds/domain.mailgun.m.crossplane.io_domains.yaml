---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: domains.domain.mailgun.m.crossplane.io
spec:
  group: domain.mailgun.m.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - mailgun
    kind: Domain
    listKind: DomainList
    plural: domains
    singular: domain
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          A Domain is a namespaced managed resource that represents a Mailgun Domain.
          This is the Crossplane v2 namespaced version.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A DomainSpec defines the desired state of a Domain.
            properties:
              forProvider:
                description: DomainParameters define the desired state of a Mailgun
                  Domain
                properties:
                  dkimKeySize:
                    default: 1024
                    description: DKIMKeySize specifies the DKIM key size (1024 or
                      2048)
                    enum:
                    - 1024
                    - 2048
                    type: integer
                  forceDkimAuthority:
                    default: false
                    description: ForceDKIMAuthority forces DKIM authority even if
                      subdomain
                    type: boolean
                  ips:
                    description: IPs is a list of IP addresses to whitelist for this
                      domain
                    items:
                      type: string
                    type: array
                  name:
                    description: Name is the domain name to create
                    pattern: ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$
                    type: string
                  smtpPassword:
                    description: SMTP password for the domain (if not set, will be
                      auto-generated)
                    type: string
                  spamAction:
                    default: disabled
                    description: Spam action for the domain
                    enum:
                    - disabled
                    - block
                    - tag
                    type: string
                  tracking:
                    description: Tracking settings for the domain
                    properties:
                      click:
                        default: false
                        description: Click tracking enabled
                        type: boolean
                      open:
                        default: false
                        description: Open tracking enabled
                        type: boolean
                      unsubscribe:
                        default: false
                        description: Unsubscribe tracking enabled
                        type: boolean
                    type: object
                  type:
                    default: sending
                    description: Type specifies the domain type (sending or receiving)
                    enum:
                    - sending
                    - receiving
                    type: string
                  webScheme:
                    default: http
                    description: Web scheme for tracking URLs
                    enum:
                    - http
                    - https
                    type: string
                  wildcard:
                    default: false
                    description: Wildcard setting for the domain
                    type: boolean
                required:
                - name
                type: object
            required:
            - forProvider
            type: object
          status:
            description: A DomainStatus represents the observed state of a Domain.
            properties:
              atProvider:
                description: DomainObservation reflects the observed state of a Mailgun
                  Domain
                properties:
                  createdAt:
                    description: CreatedAt is when the domain was created
                    type: string
                  id:
                    description: ID is the domain identifier in Mailgun
                    type: string
                  receivingDnsRecords:
                    description: Receiving DNS records for incoming mail
                    items:
                      description: DNSRecord represents a DNS record required for
                        domain configuration
                      properties:
                        name:
                          description: Name is the DNS record name
                          type: string
                        priority:
                          description: Priority is the MX record priority (for MX
                            records)
                          type: integer
                        type:
                          description: Type is the DNS record type (TXT, CNAME, MX)
                          type: string
                        valid:
                          description: Valid indicates if the DNS record is properly
                            configured
                          type: boolean
                        value:
                          description: Value is the DNS record value
                          type: string
                      type: object
                    type: array
                  requiredDnsRecords:
                    description: RequiredDNSRecords contains the DNS records that
                      need to be configured
                    items:
                      description: DNSRecord represents a DNS record required for
                        domain configuration
                      properties:
                        name:
                          description: Name is the DNS record name
                          type: string
                        priority:
                          description: Priority is the MX record priority (for MX
                            records)
                          type: integer
                        type:
                          description: Type is the DNS record type (TXT, CNAME, MX)
                          type: string
                        valid:
                          description: Valid indicates if the DNS record is properly
                            configured
                          type: boolean
                        value:
                          description: Value is the DNS record value
                          type: string
                      type: object
                    type: array
                  sendingDnsRecords:
                    description: Sending DNS records for outgoing mail
                    items:
                      description: DNSRecord represents a DNS record required for
                        domain configuration
                      properties:
                        name:
                          description: Name is the DNS record name
                          type: string
                        priority:
                          description: Priority is the MX record priority (for MX
                            records)
                          type: integer
                        type:
                          description: Type is the DNS record type (TXT, CNAME, MX)
                          type: string
                        valid:
                          description: Valid indicates if the DNS record is properly
                            configured
                          type: boolean
                        value:
                          description: Value is the DNS record value
                          type: string
                      type: object
                    type: array
                  smtpLogin:
                    description: SMTPLogin is the SMTP login for the domain
                    type: string
                  smtpPassword:
                    description: SMTPPassword is the SMTP password for the domain
                    type: string
                  state:
                    description: State is the current state of the domain (active,
                      unverified, disabled)
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
